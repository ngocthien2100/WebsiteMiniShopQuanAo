
  <!DOCTYPE html>
  <html lang="vi">
    <head>
      
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>MiniStyle - Website bán quần áo</title>
      <meta name="description" content="MiniStyle là website bán quần áo mini tích hợp chatbot tư vấn sản phẩm qua N8N." />
      <meta name="robots" content="index, follow" />
      <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>

    <body>
      
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>

        createChat({
          webhookUrl: import.meta.env.VITE_N8N_CHATBOT_WEBHOOK || 'https://linsota.app.n8n.cloud/webhook/6d800289-6942-4c85-831b-8a4b93cbd3ae'
        });
      </script>
      
    </body>
