<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đăng nhập MiniStyle</title>
  </head>
  <body style="margin:0;background:#f7f3ea;font-family:Verdana,Geneva,Tahoma,sans-serif;color:#17202a;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f7f3ea;padding:28px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:620px;background:#fffdf8;border:1px solid rgba(23,32,42,0.10);border-radius:18px;overflow:hidden;box-shadow:0 20px 50px rgba(23,32,42,0.08);">
            <tr>
              <td style="background:#123f36;padding:26px 30px;color:#ffffff;">
                <div style="display:inline-block;width:44px;height:44px;line-height:44px;text-align:center;border-radius:999px;background:#fffdf8;color:#123f36;font-weight:800;font-size:16px;">MS</div>
                <h1 style="margin:24px 0 8px;font-family:Georgia,'Times New Roman',serif;font-size:28px;line-height:1.2;font-weight:700;">Đăng nhập MiniStyle</h1>
                <p style="margin:0;color:#d7e8e1;font-size:15px;line-height:1.6;">Liên kết đăng nhập nhanh dành cho tài khoản của bạn.</p>
              </td>
            </tr>
            <tr>
              <td style="padding:30px;">
                <p style="margin:0 0 22px;font-size:16px;line-height:1.7;color:#344054;">
                  Bấm nút bên dưới để đăng nhập vào MiniStyle bằng email <strong>{{ .Email }}</strong>.
                </p>
                <div style="text-align:center;margin:30px 0;">
                  <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#123f36;color:#ffffff;text-decoration:none;padding:14px 24px;border-radius:999px;font-weight:800;font-size:15px;">Đăng nhập ngay</a>
                </div>
                <p style="margin:22px 0 0;font-size:13px;line-height:1.6;color:#667085;word-break:break-all;">{{ .ConfirmationURL }}</p>
              </td>
            </tr>
            <tr>
              <td style="padding:18px 30px;background:#fbf8f1;border-top:1px solid rgba(23,32,42,0.08);color:#667085;font-size:12px;line-height:1.6;">
                MiniStyle - Cửa hàng thời trang. Email tự động, vui lòng không trả lời trực tiếp email này.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
